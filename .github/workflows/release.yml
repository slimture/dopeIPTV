name: Release

# Build the installable packages and attach them to the GitHub Release when a
# version tag (e.g. v0.3.0) is pushed. Each job uploads its own assets, so a
# failure in one format never blocks the others.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------- Python ---
  python-dist:
    name: sdist + wheel (pipx / PyPI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bake built-in TMDB key
        env:
          DOPEIPTV_TMDB_KEY: ${{ secrets.DOPEIPTV_TMDB_KEY }}
        run: printf 'TMDB_API_KEY = "%s"\n' "${DOPEIPTV_TMDB_KEY}" > dopeiptv/_tmdb_key.py
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --upgrade build
      - run: python -m build
      - name: Smoke test - install wheel in a fresh venv
        run: |
          # Verify the wheel actually installs into a clean environment and
          # every import path is intact. PyQt6 loads libEGL/libGL at import
          # time, so the runner needs those system libraries even for a
          # headless import check - this mirrors what a real pipx user has
          # to install alongside the wheel (see the .deb depends list).
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxcb-cursor0 libpulse0 libdbus-1-3 \
            libxkbcommon0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xkb1
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install --upgrade pip
          /tmp/smoke/bin/pip install dist/*.whl
          /tmp/smoke/bin/python -c 'import dopeiptv, dopeiptv.app, dopeiptv.i18n, dopeiptv.main_window; print("wheel imports OK, VERSION =", dopeiptv.VERSION)'
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  # ------------------------------------------------ AppImage + Debian pkg ---
  linux-bundle:
    name: AppImage + .deb
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Bake built-in TMDB key
        env:
          DOPEIPTV_TMDB_KEY: ${{ secrets.DOPEIPTV_TMDB_KEY }}
        run: printf 'TMDB_API_KEY = "%s"\n' "${DOPEIPTV_TMDB_KEY}" > dopeiptv/_tmdb_key.py
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: System deps (libmpv, ffmpeg, Qt runtime, fpm, appimagetool)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            mpv libmpv-dev ffmpeg ruby ruby-dev build-essential \
            libgl1 libegl1 libxcb-cursor0 libpulse0 desktop-file-utils \
            libfuse2
          sudo gem install --no-document fpm
          wget -q -O /usr/local/bin/appimagetool \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x /usr/local/bin/appimagetool
      - name: Python build deps
        run: |
          python -m pip install --upgrade pip pyinstaller
          python -m pip install -r requirements.txt
      - name: PyInstaller bundle
        run: pyinstaller --noconfirm dopeiptv.spec   # -> dist/dopeiptv/
      - name: Render icons
        run: QT_QPA_PLATFORM=offscreen python packaging/gen_icon.py build/icons
      - name: Version
        id: v
        run: echo "version=$(python -c 'import dopeiptv,sys;print(dopeiptv.VERSION)')" >> "$GITHUB_OUTPUT"
      - name: Build AppImage
        run: |
          V=${{ steps.v.outputs.version }}
          mkdir -p AppDir/usr
          cp -r dist/dopeiptv AppDir/usr/dopeiptv
          cp build/icons/dopeiptv.png AppDir/dopeiptv.png
          sed 's/^Icon=.*/Icon=dopeiptv/' dopeiptv.desktop > AppDir/dopeiptv.desktop
          cat > AppDir/AppRun <<'EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/dopeiptv/dopeiptv" "$@"
          EOF
          chmod +x AppDir/AppRun
          ARCH=x86_64 appimagetool --no-appstream AppDir "dopeIPTV-${V}-x86_64.AppImage"
      - name: Build .deb
        run: |
          V=${{ steps.v.outputs.version }}
          root=pkgroot
          mkdir -p "$root/opt/dopeiptv" "$root/usr/bin" \
                   "$root/usr/share/applications" \
                   "$root/usr/share/icons/hicolor/256x256/apps"
          cp -r dist/dopeiptv/* "$root/opt/dopeiptv/"
          cat > "$root/usr/bin/dopeiptv" <<'EOF'
          #!/bin/sh
          exec /opt/dopeiptv/dopeiptv "$@"
          EOF
          chmod +x "$root/usr/bin/dopeiptv"
          install -m644 dopeiptv.desktop "$root/usr/share/applications/dopeiptv.desktop"
          install -m644 build/icons/dopeiptv.png \
            "$root/usr/share/icons/hicolor/256x256/apps/dopeiptv.png"
          fpm -s dir -t deb -n dopeiptv -v "$V" \
            --license GPL-3.0-or-later \
            --description "Modern IPTV player for Xtream Codes with EPG" \
            --url https://github.com/slimture/dopeiptv \
            --depends libgl1 --depends libegl1 --depends libxcb-cursor0 \
            --depends libpulse0 \
            -C "$root" .
      - name: Smoke test - launch AppImage and .deb
        run: |
          # Headless CI has no hardware GL, so QOpenGLWidget's GL init step
          # frequently aborts even though a real user's launch is fine. We
          # still get the signal we care about: did Python/Qt actually load
          # (imports OK, no missing shared libs) BEFORE the GL init crash?
          # A crash with an ImportError / "cannot open shared object" is a
          # real packaging bug. A crash after our app's heartbeat log line
          # is "expected in headless CI, real users are fine".
          sudo apt-get install -y --no-install-recommends \
            xvfb libgl1-mesa-dri mesa-utils
          export LIBGL_ALWAYS_SOFTWARE=1
          launch_and_check() {
            local exe="$1" name="$2"
            echo "::group::Smoke: $name"
            xvfb-run --auto-servernum --server-args='-screen 0 1024x768x24' \
              "$exe" >/tmp/$name.log 2>&1 &
            local pid=$!
            sleep 6
            if kill -0 "$pid" 2>/dev/null; then
              echo "$name: process $pid alive after 6s - PASS"
              kill "$pid" 2>/dev/null || true
              wait "$pid" 2>/dev/null || true
              echo "::endgroup::"
              return 0
            fi
            # Died early - classify.
            if grep -qE "ImportError|ModuleNotFoundError|cannot open shared object|No module named" /tmp/$name.log; then
              echo "::error::$name failed at Python / shared-library load:"
              tail -60 /tmp/$name.log
              echo "::endgroup::"
              return 1
            fi
            # Look for our own startup heartbeat to prove Python + Qt ran.
            if grep -qE "\[dopeIPTV\]|Qt platform:" /tmp/$name.log; then
              echo "$name: reached Python init before crashing (expected " \
                "under headless CI without a real GPU) - PASS"
              echo "--- log tail ---"
              tail -30 /tmp/$name.log
              echo "::endgroup::"
              return 0
            fi
            echo "::error::$name died with no useful log:"
            tail -60 /tmp/$name.log
            echo "::endgroup::"
            return 1
          }
          # AppImage: no install needed, just chmod+run.
          chmod +x dopeIPTV-*.AppImage
          launch_and_check "$PWD/$(ls dopeIPTV-*.AppImage | head -1)" appimage
          # .deb: install then run via the /usr/bin/dopeiptv wrapper.
          sudo apt-get install -y ./dopeiptv_*.deb
          launch_and_check "$(command -v dopeiptv)" deb
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.AppImage
            *.deb
      - uses: actions/upload-artifact@v4
        with:
          name: linux-bundle
          path: |
            *.AppImage
            *.deb

  # -------------------------------------------------- macOS .app + .dmg ---
  # Runs on Apple Silicon (macos-14 is arm64; GitHub gives it free for public
  # repos). Produces an unsigned .dmg - users need to right-click -> Open
  # once to get past Gatekeeper. Signing/notarising can be added later by
  # putting DEVELOPER_ID / APPLE_ID secrets in the repo and calling
  # codesign / notarytool.
  macos-dmg:
    name: macOS .dmg
    runs-on: macos-14
    continue-on-error: true   # matches Flatpak - failure here shouldn't block the other formats
    steps:
      - uses: actions/checkout@v4
      - name: Bake built-in TMDB key
        env:
          DOPEIPTV_TMDB_KEY: ${{ secrets.DOPEIPTV_TMDB_KEY }}
        run: printf 'TMDB_API_KEY = "%s"\n' "${DOPEIPTV_TMDB_KEY}" > dopeiptv/_tmdb_key.py
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: System deps (mpv, ffmpeg, create-dmg)
        run: |
          brew update
          brew install mpv ffmpeg create-dmg
      - name: Python build deps
        run: |
          python -m pip install --upgrade pip pyinstaller pyobjc-core
          python -m pip install -r requirements.txt
      - name: Version
        id: v
        run: echo "version=$(python -c 'import dopeiptv,sys;print(dopeiptv.VERSION)')" >> "$GITHUB_OUTPUT"
      - name: Build .icns
        run: |
          QT_QPA_PLATFORM=offscreen python packaging/gen_iconset.py build
          iconutil -c icns build/dopeiptv.iconset -o build/dopeiptv.icns
      - name: PyInstaller bundle (.app)
        env:
          DOPEIPTV_VERSION: ${{ steps.v.outputs.version }}
          DOPEIPTV_ICNS: ${{ github.workspace }}/build/dopeiptv.icns
        run: pyinstaller --noconfirm dopeiptv-mac.spec   # -> dist/dopeIPTV.app
      - name: Pack .dmg
        run: |
          V=${{ steps.v.outputs.version }}
          # Use create-dmg for the pretty side-by-side install window (app
          # icon on the left, /Applications alias on the right). --skip-jenkins
          # avoids CI-specific quirks; --no-internet-enable stops macOS from
          # tagging the DMG as internet-quarantined at mount time.
          create-dmg \
            --volname "dopeIPTV ${V}" \
            --window-pos 200 120 \
            --window-size 600 380 \
            --icon-size 100 \
            --icon "dopeIPTV.app" 150 190 \
            --app-drop-link 450 190 \
            --hide-extension "dopeIPTV.app" \
            --no-internet-enable \
            --skip-jenkins \
            "dopeIPTV-${V}-macOS-arm64.dmg" \
            "dist/dopeIPTV.app"
      - name: Smoke test - mount .dmg and inspect the bundle
        run: |
          # Full GUI launch isn't feasible on a headless macOS runner (Cocoa
          # needs a real window server), so we verify the .app STRUCTURE
          # instead: Info.plist keys, the main binary, libmpv and its rpath,
          # icon file, and that hdiutil can actually mount the .dmg.
          V=${{ steps.v.outputs.version }}
          DMG="dopeIPTV-${V}-macOS-arm64.dmg"
          echo "::group::Mount and inspect $DMG"
          MOUNT=$(hdiutil attach -readonly -mountrandom /tmp "$DMG" | tail -1 | awk '{print $NF}')
          APP="$MOUNT/dopeIPTV.app"
          test -d "$APP" || { echo "::error::.app missing inside mounted .dmg"; hdiutil detach "$MOUNT" || true; exit 1; }
          BIN="$APP/Contents/MacOS/dopeiptv"
          PLIST="$APP/Contents/Info.plist"
          test -x "$BIN" || { echo "::error::binary missing or not executable: $BIN"; hdiutil detach "$MOUNT" || true; exit 1; }
          test -f "$PLIST" || { echo "::error::Info.plist missing"; hdiutil detach "$MOUNT" || true; exit 1; }
          NAME=$(defaults read "${APP}/Contents/Info" CFBundleName)
          VER=$(defaults read "${APP}/Contents/Info" CFBundleShortVersionString)
          echo "CFBundleName=$NAME  CFBundleShortVersionString=$VER"
          test "$NAME" = "dopeIPTV" || { echo "::error::wrong CFBundleName ($NAME)"; hdiutil detach "$MOUNT" || true; exit 1; }
          # libmpv must be bundled and linked via a resolvable path.
          find "$APP/Contents" -name 'libmpv*' -print
          otool -L "$BIN" | head -20 || true
          # Check the icon actually made it in.
          test -f "$APP/Contents/Resources/dopeiptv.icns" \
            && echo "icon: present" \
            || echo "::warning::icon missing (Info.plist references it but file not found)"
          hdiutil detach "$MOUNT"
          echo "::endgroup::"
          # As a final sanity check try to launch the .app briefly. On a
          # headless runner Cocoa may fail to fully init but a segfault-on-
          # startup would still surface within a couple of seconds.
          echo "::group::Try launching the .app"
          open --wait-apps --new "dist/dopeIPTV.app" &
          OPEN_PID=$!
          sleep 6
          if pgrep -x dopeiptv >/dev/null; then
            echo "dopeiptv is running - PASS"
            pkill -x dopeiptv 2>/dev/null || true
          else
            echo "::warning::dopeiptv didn't appear in pgrep - Cocoa may need a window server"
          fi
          kill "$OPEN_PID" 2>/dev/null || true
          echo "::endgroup::"
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: '*.dmg'
      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: '*.dmg'

  # --------------------------------------------------------------- Flatpak ---
  # Most likely to need iteration (building libmpv in Flatpak). Kept from
  # blocking the release with continue-on-error.
  flatpak:
    name: Flatpak (experimental)
    runs-on: ubuntu-latest
    continue-on-error: true
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-24.08
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      - name: Bake built-in TMDB key
        env:
          DOPEIPTV_TMDB_KEY: ${{ secrets.DOPEIPTV_TMDB_KEY }}
        run: printf 'TMDB_API_KEY = "%s"\n' "${DOPEIPTV_TMDB_KEY}" > dopeiptv/_tmdb_key.py
      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: dopeIPTV.flatpak
          manifest-path: packaging/flatpak/io.github.slimture.dopeIPTV.yaml
          cache-key: flatpak-builder-${{ github.sha }}
      - name: Smoke test - install flatpak and verify metadata
        run: |
          # The flatpak-github-actions container is stripped down to
          # flatpak+build tools and has neither apt-get, yum nor dnf, so we
          # can't add xvfb and do a full launch here. Instead verify that:
          #   1) the bundle installs into the system repo cleanly, and
          #   2) 'flatpak info' can read every key it needs to launch (the
          #      runtime it wants, the binary path, the app-id).
          # A full launch smoke happens once a user downloads it. If the
          # bundle format itself were broken, install would fail with a
          # 'no such ref' or 'corrupt metadata' error - that IS caught here.
          echo "::group::Install"
          flatpak install --system --bundle --noninteractive --assumeyes \
            dopeIPTV.flatpak
          echo "::endgroup::"
          echo "::group::Inspect installed app"
          flatpak info io.github.slimture.dopeIPTV
          flatpak info --show-runtime io.github.slimture.dopeIPTV
          echo "::endgroup::"
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dopeIPTV.flatpak
