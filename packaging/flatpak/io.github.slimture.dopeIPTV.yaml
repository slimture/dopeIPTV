# Flatpak manifest for dopeIPTV.
#
# NOTE: this is a first pass and will very likely need a couple of CI
# iterations - building libmpv inside Flatpak (libass/libplacebo/ffmpeg) is
# the fiddly part. The AppImage/.deb/pip artifacts do not depend on this.
app-id: io.github.slimture.dopeIPTV
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
command: dopeiptv
finish-args:
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --talk-name=org.freedesktop.ScreenSaver
  - --talk-name=org.freedesktop.Flatpak

# ffmpeg (recording + mpv demux/decode) from the runtime extension.
add-extensions:
  org.freedesktop.Platform.ffmpeg-full:
    directory: lib/ffmpeg
    version: '23.08'
    add-ld-path: .
    autodelete: false

cleanup-commands:
  - mkdir -p /app/lib/ffmpeg

modules:
  # --- libass (subtitle rendering for mpv) ---
  - name: libass
    config-opts: [--disable-static]
    sources:
      - type: archive
        url: https://github.com/libass/libass/releases/download/0.17.1/libass-0.17.1.tar.xz
        sha256: f0da0bbfba476c16ae3e1cfd862256d30915911f7abaa1b16ce62ee653192784

  # --- libmpv ---
  # libplacebo may also be required for the OpenGL render path; add it here if
  # CI reports it missing.
  - name: mpv
    buildsystem: simple
    build-commands:
      - python3 waf configure --prefix=/app --enable-libmpv-shared
        --disable-cplayer --disable-manpage-build --disable-javascript
      - python3 waf build
      - python3 waf install
    sources:
      - type: archive
        url: https://github.com/mpv-player/mpv/archive/refs/tags/v0.37.0.tar.gz
        sha256: 1d2d4adbaf048a2fa6ee134575032c4b2dad9a7efafd5b3e69b88db935afe097
      - type: file
        url: https://waf.io/waf-2.0.25
        sha256: 21199cd220ccf60434133e1fd2ab8c8e5217c3799199c82722543970dc8e38d5
        dest-filename: waf

  # --- the Python app + its wheels (PyQt6 bundles its own Qt) ---
  - name: dopeiptv
    buildsystem: simple
    build-commands:
      - pip3 install --no-index --find-links=deps --prefix=/app
        PyQt6 requests python-mpv pychromecast .
      - install -Dm755 dopeiptv.py /app/bin/dopeiptv
      - install -Dm644 packaging/io.github.slimture.dopeIPTV.desktop
        /app/share/applications/io.github.slimture.dopeIPTV.desktop
      - install -Dm644 packaging/io.github.slimture.dopeIPTV.metainfo.xml
        /app/share/metainfo/io.github.slimture.dopeIPTV.metainfo.xml
    sources:
      - type: dir
        path: ../..
    # `deps` should be populated by flatpak-pip-generator (see the workflow),
    # or replace the --no-index/--find-links line with plain `pip3 install`
    # if the build sandbox is allowed network access.
