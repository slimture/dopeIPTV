# Flatpak manifest for dopeIPTV - Flathub-ready (fully offline build).
#
# Strategy: build libmpv (+ libplacebo + libass) from source on the
# freedesktop runtime, then pip-install the app and its Python deps from
# vendored wheels declared as sources (no network at build time - Flathub
# requirement). Runtime network (--share=network in finish-args) is kept: the
# app streams IPTV, which needs it.
#
# The Python wheels below are pinned to Python 3.12 / manylinux, matching the
# 24.08 runtime. Regenerate them by re-running the pip download used to
# produce this list when bumping deps (see the CONTRIBUTING/flatpak notes).
#
# The libmpv/libplacebo/libass recipe mirrors Celluloid's known-good Flathub
# manifest, so the fiddly media stack builds reliably.
app-id: io.github.slimture.dopeIPTV
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: dopeiptv

finish-args:
  # Runtime network: the app streams IPTV.
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  # GPU access for mpv's OpenGL render path.
  - --device=dri
  # Recordings + playlists live under the user's home; the app writes files
  # directly (not only via the portal), so it needs home access.
  - --filesystem=home
  # Inhibit the screensaver / suspend while a video plays.
  - --talk-name=org.freedesktop.ScreenSaver
  - --talk-name=org.freedesktop.login1
  - --system-talk-name=org.freedesktop.login1
  - --env=LC_NUMERIC=C

# Full ffmpeg from the runtime extension (mpv links the SDK's ffmpeg at build
# time; this provides the complete codec set at runtime).
add-extensions:
  org.freedesktop.Platform.ffmpeg-full:
    directory: lib/ffmpeg
    version: '24.08'
    add-ld-path: .
    autodelete: false

cleanup-commands:
  - mkdir -p /app/lib/ffmpeg

modules:
  # --- libass (subtitle rendering for mpv) ---
  - name: libass
    cleanup:
      - /include
      - /lib/*.la
      - /lib/pkgconfig
    config-opts:
      - --disable-static
    sources:
      - type: archive
        url: https://github.com/libass/libass/releases/download/0.17.5/libass-0.17.5.tar.xz
        sha256: 2dca25c0e0c837ddf00b52011b3f82cac1e4ddd3ad018227806b0c2288864acc

  # --- libplacebo (required by mpv's GPU/GL render path) ---
  - name: libplacebo
    buildsystem: meson
    cleanup:
      - /include
      - /lib/pkgconfig
    sources:
      - type: git
        url: https://github.com/haasn/libplacebo.git
        tag: v7.360.1
        commit: cee9b076f2c63104ccfd497fa79c39a867293ec4

  # --- libmpv ---
  - name: mpv
    buildsystem: meson
    cleanup:
      - /include
      - /lib/pkgconfig
      - /share/man
      - /share/bash-completion
      - /share/zsh
      - /share/doc
      - /share/applications
      - /share/icons
    config-opts:
      - -Dlibmpv=true
      - -Dcplayer=false
      - -Dbuild-date=false
      - -Dalsa=disabled
      - -Dlua=disabled
      - -Djavascript=disabled
    sources:
      - type: archive
        url: https://github.com/mpv-player/mpv/archive/v0.41.0.tar.gz
        sha256: ee21092a5ee427353392360929dc64645c54479aefdb5babc5cfbb5fad626209

  # --- the dopeIPTV app + its Python deps, all from vendored wheels ---
  - name: dopeiptv
    buildsystem: simple
    build-commands:
      # Offline: install the runtime deps and build/install the app from the
      # wheels fetched into the build dir as sources (no --share=network).
      - pip3 install --no-index --find-links="${PWD}" --prefix=${FLATPAK_DEST}
        PyQt6 requests python-mpv pychromecast .
      - install -Dm644 packaging/io.github.slimture.dopeIPTV.desktop
        ${FLATPAK_DEST}/share/applications/io.github.slimture.dopeIPTV.desktop
      - install -Dm644 packaging/io.github.slimture.dopeIPTV.metainfo.xml
        ${FLATPAK_DEST}/share/metainfo/io.github.slimture.dopeIPTV.metainfo.xml
      - install -Dm644 packaging/io.github.slimture.dopeIPTV.png
        ${FLATPAK_DEST}/share/icons/hicolor/256x256/apps/io.github.slimture.dopeIPTV.png
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/df/b2/87e62e8c3e2f4b32e5fe99e0b86d576da1312593b39f47d8ceef365e95ed/packaging-26.2-py3-none-any.whl
