# Flatpak manifest for dopeIPTV.
#
# Strategy: build libmpv (+ libplacebo + libass) from source on the
# freedesktop runtime, then pip-install the PyQt6 app itself. The app module
# is allowed network access at build time (build-args: --share=network) so we
# don't have to vendor every wheel - this is fine because we ship our own
# .flatpak bundle from CI and do not submit to Flathub (which forbids it).
#
# The libmpv/libplacebo/libass module recipe mirrors Celluloid's known-good
# Flathub manifest, so the fiddly media stack builds reliably.
app-id: io.github.slimture.dopeIPTV
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: dopeiptv

finish-args:
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=all
  - --filesystem=home
  - --talk-name=org.freedesktop.ScreenSaver
  - --talk-name=org.freedesktop.login1
  - --system-talk-name=org.freedesktop.login1
  - --env=LC_NUMERIC=C

# Full ffmpeg from the runtime extension (mpv links the SDK's ffmpeg at build
# time; this provides the complete codec set at runtime).
add-extensions:
  org.freedesktop.Platform.ffmpeg-full:
    directory: lib/ffmpeg
    version: '24.08'
    add-ld-path: .
    autodelete: false

cleanup-commands:
  - mkdir -p /app/lib/ffmpeg

modules:
  # --- libass (subtitle rendering for mpv) ---
  - name: libass
    cleanup:
      - /include
      - /lib/*.la
      - /lib/pkgconfig
    config-opts:
      - --disable-static
    sources:
      - type: archive
        url: https://github.com/libass/libass/releases/download/0.17.5/libass-0.17.5.tar.xz
        sha256: 2dca25c0e0c837ddf00b52011b3f82cac1e4ddd3ad018227806b0c2288864acc

  # --- libplacebo (required by mpv's GPU/GL render path) ---
  - name: libplacebo
    buildsystem: meson
    cleanup:
      - /include
      - /lib/pkgconfig
    sources:
      - type: git
        url: https://github.com/haasn/libplacebo.git
        tag: v7.360.1
        commit: cee9b076f2c63104ccfd497fa79c39a867293ec4

  # --- libmpv ---
  - name: mpv
    buildsystem: meson
    cleanup:
      - /include
      - /lib/pkgconfig
      - /share/man
      - /share/bash-completion
      - /share/zsh
      - /share/doc
      - /share/applications
      - /share/icons
    config-opts:
      - -Dlibmpv=true
      - -Dcplayer=false
      - -Dbuild-date=false
      - -Dalsa=disabled
      - -Dlua=disabled
      - -Djavascript=disabled
    sources:
      - type: archive
        url: https://github.com/mpv-player/mpv/archive/v0.41.0.tar.gz
        sha256: ee21092a5ee427353392360929dc64645c54479aefdb5babc5cfbb5fad626209

  # --- the dopeIPTV app + its Python deps (PyQt6 bundles its own Qt) ---
  - name: dopeiptv
    buildsystem: simple
    build-options:
      build-args:
        - --share=network
    build-commands:
      - pip3 install --prefix=/app --no-cache-dir
        PyQt6 requests python-mpv pychromecast .
      - install -Dm644 packaging/io.github.slimture.dopeIPTV.desktop
        /app/share/applications/io.github.slimture.dopeIPTV.desktop
      - install -Dm644 packaging/io.github.slimture.dopeIPTV.metainfo.xml
        /app/share/metainfo/io.github.slimture.dopeIPTV.metainfo.xml
      - install -Dm644 packaging/io.github.slimture.dopeIPTV.png
        /app/share/icons/hicolor/256x256/apps/io.github.slimture.dopeIPTV.png
    sources:
      - type: dir
        path: ../..
