# TLS-front proxy — front for iptv.dope.rs
# Place at: /usr/local/etc/nginx/conf.d/iptv.dope.rs.conf
#
# 1) Add a CSP row for this host to the `map $server_name $csp_policy` block in
#    /usr/local/etc/nginx/nginx.conf (see csp.snippet.txt):
#
#    "iptv.dope.rs" "default-src 'self'; img-src 'self' data:; style-src 'self'; script-src 'self'; connect-src 'self'; font-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none';";
#
# 2) Issue a cert first (or reuse a wildcard *.dope.rs if you have one):
#    certbot certonly --webroot -w /usr/local/www/letsencrypt -d iptv.dope.rs

server {
    listen 0.0.0.0:443 ssl;
    server_name iptv.dope.rs;

    ssl_certificate     /usr/local/etc/letsencrypt/live/iptv.dope.rs/fullchain.pem;
    ssl_certificate_key /usr/local/etc/letsencrypt/live/iptv.dope.rs/privkey.pem;

    location / {
        proxy_pass http://CONTENT_HOST:8081;   # <-- your content server's internal address:port

        limit_req  zone=general burst=20 nodelay;
        limit_conn conn_limit 20;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  443;
    }
}
