# TLS-front proxy — front for iptv.dope.rs
# Place at: /usr/local/etc/nginx/conf.d/iptv.dope.rs.conf
#
# 1) Add a CSP row for this host to the `map $server_name $csp_policy` block in
#    /usr/local/etc/nginx/nginx.conf (see csp.snippet.txt):
#
#    "iptv.dope.rs" "default-src 'self'; img-src 'self' data:; style-src 'self'; script-src 'self'; connect-src 'self'; font-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none';";
#
# 2) TLS cert. Two options:
#    a) Add iptv.dope.rs as a SAN to an existing multi-domain cert (cleaner if
#       you already have one) - list ALL current domains plus the new one:
#         certbot certonly --cert-name YOURCERT --webroot -w /usr/local/www/letsencrypt \
#           -d your.domain -d ... -d iptv.dope.rs
#       then point ssl_certificate below at that cert's live/YOURCERT/ path.
#    b) Or issue a standalone cert for just this host:
#         certbot certonly --webroot -w /usr/local/www/letsencrypt -d iptv.dope.rs
#       then use live/iptv.dope.rs/ below.

server {
    listen 0.0.0.0:443 ssl;
    server_name iptv.dope.rs;

    # Point these at whichever cert covers iptv.dope.rs (see note above).
    ssl_certificate     /usr/local/etc/letsencrypt/live/YOURCERT/fullchain.pem;
    ssl_certificate_key /usr/local/etc/letsencrypt/live/YOURCERT/privkey.pem;

    location / {
        proxy_pass http://CONTENT_HOST:8081;   # <-- your content server's internal address:port

        limit_req  zone=general burst=20 nodelay;
        limit_conn conn_limit 20;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  443;
    }
}
