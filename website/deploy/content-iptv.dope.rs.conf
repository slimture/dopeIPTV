# Content server — for iptv.dope.rs (behind the TLS-front proxy)
# Place at: /usr/local/etc/nginx/conf.d/iptv.dope.rs.conf  (included by nginx.conf)
#
# Deploy the site's public/ dir to /usr/local/www/iptv/public and put
# sync-releases.php at /usr/local/www/iptv/sync-releases.php (one level up, so
# it is NOT web-served). The php-handler upstream (127.0.0.1:9000) already
# exists in your nginx.conf.

server {
    listen 8081;               # dedicated port; the TLS-front proxy proxies here
    server_name iptv.dope.rs;

    root  /usr/local/www/iptv/public;
    index index.php index.html;

    absolute_redirect off;
    port_in_redirect  off;
    server_tokens off;

    charset utf-8;
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml application/manifest+json;

    # Long-cache the immutable release files and static assets.
    location /files/ {
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }
    location ~* \.(css|js|svg|png|webmanifest)$ {
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # Landing page. '/' hits this prefix location; the `index index.php` above
    # makes nginx internally redirect to /index.php, which then matches the
    # \.php$ handler below and runs through PHP-FPM. (A `try_files /index.php`
    # would instead serve the file as RAW SOURCE - which is why the page showed
    # literal <?= ?> tags before.)
    location / {
        try_files $uri $uri/ =404;
    }
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass php-handler;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # sync-releases.php lives one level ABOVE the web root, so it is never
    # reachable here anyway; deny is belt-and-suspenders.
    location = /sync-releases.php { deny all; }
}
