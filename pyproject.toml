[build-system]
requires = ["setuptools>=77"]
build-backend = "setuptools.build_meta"

[project]
name = "dopeiptv"
version = "0.7.0"
description = "Modern IPTV player"
readme = "README.md"
requires-python = ">=3.11"
license = "GPL-3.0-or-later"
license-files = ["LICENSE"]

dependencies = [
    "PyQt6>=6.5",
    "requests>=2.28",
    "python-mpv>=1.0",
    "pychromecast>=13.0",
]

[project.scripts]
dopeiptv = "dopeiptv.app:main"

[tool.setuptools.packages.find]
include = ["dopeiptv*"]
